meters:
  - name: standard_core_licenses
    unit: core-license
    aggregation: sum
    dimensions:
      - tenant
      - server
  - name: datacenter_core_licenses
    unit: core-license
    aggregation: sum
    dimensions:
      - tenant
      - server
  - name: cals
    unit: seat-year
    aggregation: sum
    dimensions:
      - tenant
      - cal_type
  - name: payg_core_hours
    unit: core-hour
    aggregation: sum
    dimensions:
      - server
      - region
  - name: payg_core_months
    unit: core-month
    aggregation: sum
    dimensions:
      - server
      - region
principles:
  - name: Visibility
    description: Use Volume Licensing Service Center exports for perpetual core/CAL counts; pull Azure
      Cost Management for Arc-billed pay-as-you-go core-hours; tag servers with workload owner via
      Azure Arc machine tags.
  - name: Allocation
    description: Allocate Datacenter packs to virtualization clusters and Standard packs to physical
      hosts; charge CALs back per business unit; Arc-billed PAYG can be tagged at the server level for
      direct chargeback.
  - name: Optimization
    description: Consolidate VM density to fewer Datacenter-licensed hosts; right-size cores (avoid
      over-licensing 8-core servers with 16-core packs); use Azure Hybrid Benefit for cloud workloads;
      switch bursty / dev workloads to PAYG instead of perpetual.
  - name: Accountability
    description: Assign a license owner per cluster; review CAL consumption against headcount quarterly;
      reconcile PAYG core-hours against forecast.
