description: 'FOCUS-aligned FinOps for Windows Server: perpetual core-based licenses (Standard $1,176,
  Datacenter $6,771 per 16-core pack) plus mandatory CALs, with optional Azure-Arc-billed pay-as-you-go
  ($33.58/core/month or $0.046/core/hour) for elastic workloads.'
