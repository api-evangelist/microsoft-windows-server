naftiko: "1.0.0-alpha1"

info:
  label: "IIS Administration API"
  description: "REST API for managing IIS web sites, applications, and application pools with full CRUD operations."
  tags:
    - Microsoft
    - IIS
    - Web Server
    - Windows Server
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      IIS_ACCESS_TOKEN: IIS_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: iis-administration
      baseUri: https://localhost:55539
      description: "IIS Administration REST API for web server management."
      authentication:
        type: bearer
        token: "{{IIS_ACCESS_TOKEN}}"
      resources:
        - name: websites
          path: /api/webserver
          description: "Web site management"
          operations:
            - name: list-websites
              method: GET
              description: "List all web sites"
              inputParameters:
                - name: application_pool.id
                  in: query
                  type: string
                  required: false
                  description: "Filter by application pool"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-website
              method: POST
              description: "Create a new web site"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  physical_path: "{{tools.physical_path}}"
                  bindings: "{{tools.bindings}}"
            - name: get-website
              method: GET
              description: "Get a web site by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Web site identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-website
              method: PATCH
              description: "Update a web site"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Web site identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: delete-website
              method: DELETE
              description: "Delete a web site"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Web site identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: applications
          path: /api/webserver
          description: "Web application management"
          operations:
            - name: list-applications
              method: GET
              description: "List all web applications"
              inputParameters:
                - name: website.id
                  in: query
                  type: string
                  required: false
                  description: "Filter by web site"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-application
              method: POST
              description: "Create a web application"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  path: "{{tools.path}}"
                  physical_path: "{{tools.physical_path}}"
            - name: get-application
              method: GET
              description: "Get a web application by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Application identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-application
              method: PATCH
              description: "Update a web application"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Application identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-application
              method: DELETE
              description: "Delete a web application"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Application identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: application-pools
          path: /api/webserver
          description: "Application pool management"
          operations:
            - name: list-application-pools
              method: GET
              description: "List all application pools"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-application-pool
              method: POST
              description: "Create an application pool"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: get-application-pool
              method: GET
              description: "Get an application pool by ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Application pool identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-application-pool
              method: PATCH
              description: "Update an application pool"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Application pool identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-application-pool
              method: DELETE
              description: "Delete an application pool"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Application pool identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: iis-rest
      resources:
        - path: /v1/websites
          name: websites
          operations:
            - method: GET
              name: list-websites
              call: "iis-administration.list-websites"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: iis-mcp
      transport: http
      tools:
        - name: list-websites
          description: "List all IIS web sites"
          hints:
            readOnly: true
          call: "iis-administration.list-websites"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-website
          description: "Create a new IIS web site"
          hints:
            readOnly: false
          call: "iis-administration.create-website"
          with:
            name: "tools.name"
            physical_path: "tools.physical_path"
            bindings: "tools.bindings"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-website
          description: "Get web site details"
          hints:
            readOnly: true
          call: "iis-administration.get-website"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-website
          description: "Update a web site"
          hints:
            readOnly: false
            idempotent: true
          call: "iis-administration.update-website"
          with:
            id: "tools.id"
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-website
          description: "Delete a web site"
          hints:
            destructive: true
          call: "iis-administration.delete-website"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-applications
          description: "List all web applications"
          hints:
            readOnly: true
          call: "iis-administration.list-applications"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-application
          description: "Create a web application"
          hints:
            readOnly: false
          call: "iis-administration.create-application"
          with:
            path: "tools.path"
            physical_path: "tools.physical_path"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-application
          description: "Get web application details"
          hints:
            readOnly: true
          call: "iis-administration.get-application"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-application
          description: "Update a web application"
          hints:
            readOnly: false
            idempotent: true
          call: "iis-administration.update-application"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-application
          description: "Delete a web application"
          hints:
            destructive: true
          call: "iis-administration.delete-application"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-application-pools
          description: "List all application pools"
          hints:
            readOnly: true
          call: "iis-administration.list-application-pools"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-application-pool
          description: "Create an application pool"
          hints:
            readOnly: false
          call: "iis-administration.create-application-pool"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-application-pool
          description: "Get application pool details"
          hints:
            readOnly: true
          call: "iis-administration.get-application-pool"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-application-pool
          description: "Update an application pool"
          hints:
            readOnly: false
            idempotent: true
          call: "iis-administration.update-application-pool"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-application-pool
          description: "Delete an application pool"
          hints:
            destructive: true
          call: "iis-administration.delete-application-pool"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
